<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#13151d"/>

  <!-- Tragedy mask (behind, darker red) -->
  <ellipse cx="20" cy="18" rx="9" ry="10" fill="#8b1c1c"/>
  <ellipse cx="17" cy="16.5" rx="1.7" ry="2.2" fill="#13151d"/>
  <ellipse cx="23" cy="16.5" rx="1.7" ry="2.2" fill="#13151d"/>
  <!-- frown -->
  <path d="M17 22 Q20 19.5 23 22" stroke="#13151d" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- Comedy mask (front, bright red) -->
  <ellipse cx="13" cy="15" rx="9" ry="10" fill="#e53535"/>
  <ellipse cx="10" cy="13.5" rx="1.7" ry="2.2" fill="#13151d"/>
  <ellipse cx="16" cy="13.5" rx="1.7" ry="2.2" fill="#13151d"/>
  <!-- smile -->
  <path d="M10 18 Q13 21.5 16 18" stroke="#13151d" stroke-width="1.6" fill="none" stroke-linecap="round"/>
</svg>
